<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Calendar body -->
  <rect x="48" y="80" width="416" height="384" rx="32" fill="#ffffff" stroke="#3b82f6" stroke-width="16"/>
  <!-- Calendar top bar -->
  <rect x="48" y="80" width="416" height="96" rx="32" fill="#3b82f6"/>
  <rect x="48" y="144" width="416" height="32" fill="#3b82f6"/>
  <!-- Rings -->
  <rect x="144" y="48" width="24" height="72" rx="12" fill="#1e40af"/>
  <rect x="344" y="48" width="24" height="72" rx="12" fill="#1e40af"/>
  <!-- Hebrew letter (ח for חייקי) -->
  <text x="256" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="#3b82f6">ח</text>
</svg>
